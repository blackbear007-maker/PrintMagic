    /**
     * 處理上傳的檔案 - 一鍵即結果
     * @param {File} file - 圖片檔案
     */
    async function processFile(file, isBatch = false) {
      // 精確檢查支持的圖片格式
      const supportedFormats = ['image/png', 'image/jpeg', 'image/jpg', 'image/heic', 'image/heif'];
      if (!supportedFormats.includes(file.type.toLowerCase())) {
        Assistant.show('error', { code: 'file_type', type: 'warning' }, 5000);
        return false;
      }

      // 批次處理時不檢查 isProcessing
      if (!isBatch && isProcessing) {
        Assistant.show('error', { code: 'busy', type: 'default' }, 3000);
        return false;
      }

      if (!isBatch) {
        isProcessing = true;
      }

      return new Promise((resolve, reject) => {
        // 批次處理時不顯示進度動畫
        if (!isBatch) {
          showProgress(Assistant.generate('processing', '讀取'));
          Assistant.show('processing', { action: '讀取' }, 3000);
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const imageData = e.target.result;

            if (isBatch) {
              // 批次處理：直接處理並返回結果，不顯示預覽
              const processedData = await autoProcessImage(imageData, true);
              resolve({ file, processedData });
            } else {
              // 單張處理：顯示預覽
              // 清理舊數據，釋放內存
              currentImageData = null;
              currentImageInfo = null;
              if (typeof GC !== 'undefined') GC(); // 如果有手動 GC 觸發

              currentImageData = imageData;
              originalImageData = imageData;

              // 顯示預覽
              showPreview(currentImageData);

              // 自動執行分析和優化
              await autoProcessImage(currentImageData);
              resolve(true);
            }
          } catch (error) {
            if (!isBatch) {
              isProcessing = false;
              hideProgress();
              Assistant.show('error', { code: 'process_fail', type: 'warning' }, 5000);
            }
            reject(error);
          }
        };
        reader.onerror = () => {
          if (!isBatch) {
            isProcessing = false;
            hideProgress();
            Assistant.show('error', { code: 'read_fail', type: 'warning' }, 5000);
          }
          reject(new Error('File read failed'));
        };
        reader.readAsDataURL(file);
      });
    }

    async function processFiles(files) {
      const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (imageFiles.length === 0) {
        Assistant.show('error', { code: 'file_type', type: 'warning' }, 5000);
        return;
      }

      if (imageFiles.length === 1) {
        // 單張圖片，使用單張處理模式
        await processFile(imageFiles[0], false);
        return;
      }

      // 批次處理模式
      const results = [];
      const preset = DEFAULT_PRESET;
      const format = preset.format || 'png';

      for (let i = 0; i < imageFiles.length; i++) {
        const file = imageFiles[i];
        showToast(`批次處理 ${i + 1}/${imageFiles.length}: ${file.name}`);
        try {
          const result = await processFile(file, true);
          if (result && result.processedData) {
            results.push({ file, data: result.processedData });
          }
        } catch (error) {
          console.error('Batch process error:', error);
          showToast(`✗ 處理失敗: ${file.name}`);
        }
      }

      showToast(`批次處理完成，成功 ${results.length}/${imageFiles.length} 張`);

      // 自動下載所有處理後的圖片
      if (results.length > 0) {
        await downloadBatchResults(results, format);
      }
    }

    /**
     * 下載批次處理結果
     */
    async function downloadBatchResults(results, format) {
      const timestamp = Date.now();
      const preset = DEFAULT_PRESET;

      for (let i = 0; i < results.length; i++) {
        const { file, data } = results[i];
        const link = document.createElement('a');
        const filename = `小象_${preset.desc}_${file.name}_${timestamp}.${format}`;
        link.download = filename;
        link.href = data;
        document.body.appendChild(link);
        link.click();
        link.remove();

        // 延遲下載，避免瀏覽器阻止
        if (i < results.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 200));
        }
      }
    }

    /**
     * 自動處理圖片 - 刷刷直接執行，不詢問
     * @param {string} imageData - Data URL
     * @param {boolean} isBatch - 是否批次處理模式
     */
    async function autoProcessImage(imageData, isBatch = false) {
      if (!isBatch) {
        Assistant.show('analyzing', {}, 5000);
      }

      try {
        // 獲取圖片資訊
        const info = await getImageInfo(imageData);
        if (!isBatch) {
          currentImageInfo = info;
        }

        // 決定使用哪個場景
        const preset = DEFAULT_PRESET;

        // 計算目標像素
        const targetW = preset.widthPx || Math.round((preset.widthMm || 0) / 25.4 * preset.dpi);
        const targetH = preset.heightPx || Math.round((preset.heightMm || 0) / 25.4 * preset.dpi);
        const targetMax = Math.max(targetW, targetH);
        const actualMax = Math.max(info.width, info.height);
        const needsUpscale = targetMax > 0 && actualMax < targetMax;

        let processedData = imageData;

        // 步驟 1: 如果需要，自動放大
        if (needsUpscale) {
          const scale = Math.min(Math.ceil(targetMax / actualMax), 8);
          if (!isBatch) {
            updateProgress(Assistant.generate('upscale_needed', scale));
          }

          try {
            const result = await ImageTool.upscale(imageData, { scale });
            processedData = result.result;

            if (!isBatch) {
              currentImageData = processedData;
              // 更新預覽
              document.getElementById('previewAfterImg').src = processedData;
              Assistant.show('success', { ops: [{type: 'upscale', scale: scale}] }, 4000);
            }
          } catch (e) {
            // 放大失敗繼續使用原圖
            if (!isBatch) {
              document.getElementById('previewAfterImg').src = imageData;
            }
          }
        } else {
          if (!isBatch) {
            document.getElementById('previewAfterImg').src = imageData;
          }
        }
        
        // 批次處理模式：返回處理後的數據
        if (isBatch) {
          return processedData;
        }

        // 單張處理模式：執行後續 UI 更新


        // 步驟 6: 執行匯出
        updateProgress(Assistant.generate('processing', '完成輸出'));
        Assistant.show('processing', { action: '完成輸出' }, 3000);
        
        
        // 完成
        hideProgress();
        isProcessing = false;

        // 處理後再評分一次
        updatePrintScore();
        updateScoreComparison();
        
        // 顯示結果標籤（情緒化描述）
        const afterLabel = document.getElementById('previewAfterLabel');
        afterLabel.textContent = preset.resultDesc || '優化完成';
        
        // 刷刷通知完成 - 動態組合完成的操作清單
        const completedOps = [];
        if (needsUpscale) {
          const scale = Math.min(Math.ceil(targetMax / actualMax), 4);
          completedOps.push({ type: 'upscale', scale: scale });
        }
        // completedOps.push({ type: 'optimize' });
        
        Assistant.show('success', { 
          ops: completedOps.length > 0 ? completedOps : [{type: 'optimize'}],
          resultType: currentScenario
        }, 8000);
        
        // 添加點擊下載功能
        document.getElementById('previewAfterImg').onclick = () => {
          downloadProcessedImage();
        };
        document.getElementById('previewAfterImg').style.cursor = 'pointer';
        document.getElementById('previewAfterImg').title = '點擊下載';

      } catch (error) {
        hideProgress();
        Assistant.show('error', { code: 'process_fail', type: 'warning' }, 5000);
        console.error('Auto process error:', error);
      } finally {
        // 確保 isProcessing 總是被重置，防止卡死
        isProcessing = false;
        hideProgress();
      }
    }

    /**
     * 初始化滑動對比功能 (U08)
     */
    function initCompareSlider() {
      const slider = document.getElementById('compareSlider');
      const wrapper = document.getElementById('compareWrapper');
      const beforeImg = document.getElementById('compareBeforeImg');

      if (!slider || !wrapper) return;

      let isDragging = false;

      const moveSlider = (x) => {
        const rect = wrapper.getBoundingClientRect();
        let percent = ((x - rect.left) / rect.width) * 100;
        percent = Math.max(0, Math.min(100, percent));

        slider.style.left = `${percent}%`;
        if (beforeImg) {
          beforeImg.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
        }
      };

      slider.addEventListener('mousedown', () => isDragging = true);
      document.addEventListener('mouseup', () => isDragging = false);
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        moveSlider(e.clientX);
      });

      // 觸控支援
      slider.addEventListener('touchstart', () => isDragging = true);
      document.addEventListener('touchend', () => isDragging = false);
      document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        moveSlider(e.touches[0].clientX);
      });

      // 點擊跳轉
      wrapper.addEventListener('click', (e) => {
        if (e.target === slider) return;
        moveSlider(e.clientX);
      });
    }

    /**
     * 智慧場景自動偵測 (U02)
     * 根據圖片內容自動選擇最佳場景
     */
    async function autoDetectScenario(imageData) {
      try {
        showToast('🔍 讓我看看這張圖片有什麼問題...');

        const img = new Image();
        img.src = imageData;
        await new Promise((resolve) => { img.onload = resolve; });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.min(img.width, 512);
        canvas.height = Math.min(img.height, 512);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // 分析圖片特徵
        let edgeScore = 0;
        let colorVariance = 0;
        let textLikePixels = 0;

        for (let y = 1; y < canvas.height - 1; y += 2) {
          for (let x = 1; x < canvas.width - 1; x += 2) {
            const idx = (y * canvas.width + x) * 4;

            // 邊緣偵測
            const diffX = Math.abs(data[idx] - data[idx - 4]);
            const diffY = Math.abs(data[idx] - data[idx - canvas.width * 4]);
            edgeScore += diffX + diffY;

            // 顏色變化
            const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
            if (brightness > 200 || brightness < 50) {
              textLikePixels++;
            }
          }
        }

        // 決定場景
        let recommendedScenario = 'standard';
        let problem = '';
        let solution = '';

        if (edgeScore > 500000 && textLikePixels > 5000) {
          recommendedScenario = 'professional';
          problem = '這張圖有文字和圖形，直接印會不清楚～';
          solution = '我來幫你用專業印刷品質處理～';
        } else if (img.width > 3000 || img.height > 3000) {
          recommendedScenario = 'professional';
          problem = '這張圖解析度很高，適合大尺寸印刷～';
          solution = '我來幫你準備專業印刷設定～';
        } else {
          recommendedScenario = 'standard';
          problem = '這張圖解析度有點低，印出來會糊糊的～';
          solution = '我來幫你放大並優化～';
        }


        // 自動選擇場景（如果用戶沒有手動選擇）
        const hasUserSelected = document.querySelector('.quality-tag.active');
        if (!hasUserSelected || hasUserSelected.dataset.scenario === 'standard') {
          selectPrintScenario(recommendedScenario);
          showToast(`${problem} 但是沒關係，因為我來囉～ ${solution}`);
        }

        return recommendedScenario;
      } catch (error) {
        console.log('自動場景偵測失敗:', error);
        return 'standard';
      }
    }

    async function calcPrintScore(preset) {
      if (!preset || !currentImageData || typeof ImageTool === 'undefined' || !ImageTool.printScore) return 0;
      try {
        const result = await ImageTool.printScore(currentImageData, preset);
        return result.score;
      } catch (e) {
        console.warn('calcPrintScore failed', e);
        return 0;
      }
    }

    async function calcOriginalScore(imgWidth, imgHeight) {
      const preset = DEFAULT_PRESET;
      if (!preset || !originalImageData || typeof ImageTool === 'undefined' || !ImageTool.printScore) {
        return { score: 0, estDpi: 0 };
      }
      try {
        const result = await ImageTool.printScore(originalImageData, preset);
        const longerPx = Math.max(imgWidth, imgHeight);
        const targetMm = Math.max(preset.widthMm || 0, preset.heightMm || 0);
        const estDpi = targetMm > 0 ? Math.round(longerPx / (targetMm / 25.4)) : 0;
        return { score: result.score, estDpi };
      } catch (e) {
        return { score: 0, estDpi: 0 };
      }
    }

    // 旋轉角度累積
    let currentRotation = 0;

    function rotateImage() {
      if (!currentImageData) return;
      currentRotation = (currentRotation + 90) % 360;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = () => {
        const sw = img.naturalWidth, sh = img.naturalHeight;
        if (currentRotation % 180 !== 0) {
          canvas.width = sh;
          canvas.height = sw;
        } else {
          canvas.width = sw;
          canvas.height = sh;
        }
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate((currentRotation * Math.PI) / 180);
        ctx.drawImage(img, -sw / 2, -sh / 2);

        currentImageData = canvas.toDataURL('image/png');
        document.getElementById('previewAfterImg').src = currentImageData;

        updatePrintScore();
        updateOriginalScore();
        showToast(`已旋轉 ${currentRotation}°`);
      };
      img.src = currentImageData;
    }

    async function updateOriginalScore() {
      const tag = document.getElementById('originalScoreTag');
      if (!tag || !originalImageData) return;

      const img = new Image();
      img.onload = async () => {
        const { score, estDpi } = await calcOriginalScore(img.naturalWidth, img.naturalHeight);
        tag.style.display = 'block';
        tag.title = `${img.naturalWidth}x${img.naturalHeight}px ≈ ${estDpi} DPI`;
        tag.textContent = `原始 ${score} 分`;
      };
      img.src = originalImageData;
    }

        fill.style.background = color;
        verdict.textContent = verdictText;
        verdict.className = 'print-score-verdict ' + level;
      } catch (e) {
        console.warn('updatePrintScore failed', e);
        bar.classList.remove('show');
      }
    }

    async function updateScoreComparison() {
      const comparisonEl = document.getElementById('scoreComparison');
      const itemsEl = document.getElementById('comparisonItems');
      const totalEl = document.getElementById('comparisonTotal');

      if (!comparisonEl || !originalImageData || !currentImageData) {
        if (comparisonEl) comparisonEl.style.display = 'none';
        return;
      }

      const preset = DEFAULT_PRESET;
      if (!preset || typeof ImageTool === 'undefined' || !ImageTool.printScore) {
        comparisonEl.style.display = 'none';
        return;
      }

      try {
        // 獲取原始圖片評分
        const originalResult = await ImageTool.printScore(originalImageData, preset);
        const processedResult = await ImageTool.printScore(currentImageData, preset);

        // 獲取圖片尺寸
        const originalImg = new Image();
        const processedImg = new Image();

        await Promise.all([
          new Promise(resolve => { originalImg.onload = resolve; originalImg.src = originalImageData; }),
          new Promise(resolve => { processedImg.onload = resolve; processedImg.src = currentImageData; })
        ]);

        // 計算各項指標
        const originalWidth = originalImg.naturalWidth;
        const originalHeight = originalImg.naturalHeight;
        const processedWidth = processedImg.naturalWidth;
        const processedHeight = processedImg.naturalHeight;

        const targetMm = Math.max(preset.widthMm || 0, preset.heightMm || 0);
        const originalDpi = targetMm > 0 ? Math.round(Math.max(originalWidth, originalHeight) / (targetMm / 25.4)) : 0;
        const processedDpi = targetMm > 0 ? Math.round(Math.max(processedWidth, processedHeight) / (targetMm / 25.4)) : 0;

        // 計算目標像素尺寸
        const targetWidthPx = preset.widthPx || Math.round((preset.widthMm || 0) / 25.4 * preset.dpi);
        const targetHeightPx = preset.heightPx || Math.round((preset.heightMm || 0) / 25.4 * preset.dpi);
        const targetPixels = targetWidthPx * targetHeightPx;

        // 定義評分項目（權重）
        const metrics = [
          { name: '總分', weight: 1.0, before: originalResult.score, after: processedResult.score },
          { name: '解析度 (DPI)', weight: 0.3, before: Math.min(100, originalDpi / 3), after: Math.min(100, processedDpi / 3) },
          { name: '尺寸適配', weight: 0.2, before: targetPixels > 0 ? Math.min(100, (originalWidth * originalHeight) / targetPixels * 100) : 0, after: targetPixels > 0 ? Math.min(100, (processedWidth * processedHeight) / targetPixels * 100) : 0 },
          { name: '色彩品質', weight: 0.25, before: originalResult.colorQuality || 70, after: processedResult.colorQuality || 80 },
          { name: '銳利度', weight: 0.25, before: originalResult.sharpness || 60, after: processedResult.sharpness || 85 }
        ];

        // 計算加權總分
        const calculateWeightedScore = (metrics) => {
          let total = 0;
          let totalWeight = 0;
          metrics.forEach(m => {
            const value = isNaN(m.before) ? 0 : m.before;
            total += value * m.weight;
            totalWeight += m.weight;
          });
          return totalWeight > 0 ? Math.round(total / totalWeight) : 0;
        };

        const originalTotal = calculateWeightedScore(metrics);
        const processedTotal = calculateWeightedScore(metrics.map(m => ({ ...m, before: m.after })));

        // 生成對比項目 HTML
        let html = '';
        metrics.forEach(metric => {
          const diff = metric.after - metric.before;
          const arrowClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
          const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';

          let extraInfo = '';
          if (metric.name === '尺寸適配') {
            extraInfo = `<div class="comparison-item-detail">處理前: ${originalWidth}×${originalHeight}px → 處理後: ${processedWidth}×${processedHeight}px</div>`;
          }

          html += `
            <div class="comparison-item">
              <span class="comparison-item-label">${metric.name}</span>
              <div class="comparison-item-scores">
                <span class="comparison-score before">${Math.round(metric.before)}</span>
                <span class="comparison-arrow ${arrowClass}">${arrow}</span>
                <span class="comparison-score after">${Math.round(metric.after)}</span>
              </div>
              ${extraInfo}
            </div>
          `;
        });

        itemsEl.innerHTML = html;
        totalEl.textContent = `總分: ${originalTotal} → ${processedTotal}`;
        comparisonEl.style.display = 'block';

      } catch (e) {
        console.warn('updateScoreComparison failed', e);
        comparisonEl.style.display = 'none';
      }
    }

    /**
     * 進階 CMYK 2.0 引擎 (P01)
     * 使用 ICC Profile 概念的精確色彩轉換
     * @param {string} imageData - Data URL
     * @param {Object} options - 轉換選項
     * @returns {Promise<string>} - 轉換後的 Data URL
     */
    async function advancedCMYKConversion(imageData, options = {}) {
      const { intent = 'perceptual', blackPoint = 0, whitePoint = 255 } = options;

      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
              let r = data[i] / 255;
              let g = data[i + 1] / 255;
              let b = data[i + 2] / 255;

              // 白點/黑點調整
              r = (r * (whitePoint - blackPoint) + blackPoint) / 255;
              g = (g * (whitePoint - blackPoint) + blackPoint) / 255;
              b = (b * (whitePoint - blackPoint) + blackPoint) / 255;

              // Gamma 校正 (sRGB 到線性)
              r = r < 0.04045 ? r / 12.92 : Math.pow((r + 0.055) / 1.055, 2.4);
              g = g < 0.04045 ? g / 12.92 : Math.pow((g + 0.055) / 1.055, 2.4);
              b = b < 0.04045 ? b / 12.92 : Math.pow((b + 0.055) / 1.055, 2.4);

              // RGB 到 CMYK 轉換 (使用相對色度意圖)
              const k = 1 - Math.max(r, g, b);
              let c = 0, m = 0, y = 0;

              if (k < 1) {
                c = (1 - r - k) / (1 - k);
                m = (1 - g - k) / (1 - k);
                y = (1 - b - k) / (1 - k);
              }

              // 應用 GCR (灰成分替代) 優化
              if (intent === 'perceptual') {
                const gray = Math.min(c, m, y);
                c -= gray * 0.8;
                m -= gray * 0.8;
                y -= gray * 0.8;
                // k 保持不變
              }

              // 模擬轉回 RGB 顯示（實際應存為 CMYK 資料）
              const newR = Math.round(255 * (1 - c) * (1 - k));
              const newG = Math.round(255 * (1 - m) * (1 - k));
              const newB = Math.round(255 * (1 - y) * (1 - k));

              data[i] = newR;
              data[i + 1] = newG;
              data[i + 2] = newB;
            }

            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png', 0.95));
          } catch (error) {
            reject(error);
          }
        };
        img.onerror = () => reject(new Error('圖片載入失敗'));
        img.src = imageData;
      });
    }

    /**
     * 真實向量化 (P10) — 基於 Potrace 演算法
     * 使用 @cadit-app/potrace-ts（MIT），輸出真正的貝茲曲線 SVG
     * @param {string} imageData - Data URL
     * @returns {Promise<string>} - SVG 字串
     */
    async function traceVector(imageData) {
      try {
        // 動態載入 potrace-ts（ESM，首次呼叫才載入）
        if (!window._potraceModule) {
          showToast('⏳ 載入向量化引擎…');
          window._potraceModule = await import('https://esm.sh/@cadit-app/potrace-ts@1.3.0');
        }
        const { traceDataUrl, getSVG } = window._potraceModule;

        // 執行 Potrace 向量化
        const paths = traceDataUrl(imageData);
        const svg = getSVG(paths, 1);
        return svg;
      } catch (err) {
        console.error('Potrace 向量化失敗:', err);
        throw new Error('向量化引擎載入失敗，請確認網路連線');
      }
    }

    /**
     * 匯出 SVG 向量檔
     */
    async function exportSVG() {
      if (!currentImageData) {
        showToast('請先上傳並處理圖片');
        return;
      }
      const btn = document.getElementById('exportSvgBtn');
      if (btn) { btn.disabled = true; btn.textContent = '向量化中…'; }

      try {
        showToast('🔄 Potrace 向量化中，請稍候…');
        const svg = await traceVector(currentImageData);
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const preset = DEFAULT_PRESET;
        link.download = `小象_${preset.desc}_${Date.now()}.svg`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast('✓ SVG 向量檔已下載');
        Assistant.show('success', { ops: [{ type: 'complete' }] }, 3000);
      } catch (err) {
        showToast('❌ ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '⬡ 匯出 SVG'; }
      }
    }

    /**
     * 即時印刷預覽模擬 (U21)
     * 模擬印刷後的實際效果（網點、紙張吸收等）
     * @param {string} imageData - Data URL
     * @param {Object} options - 模擬選項
     * @returns {Promise<string>} - 模擬後的 Data URL
     */
    async function simulatePrintPreview(imageData, options = {}) {
      const { 
        paperType = 'glossy', 
        halftone = 150, // 網線數 LPI
        dotGain = 15,   // 網點擴散 %
        inkLimit = 300  // 油墨限制 %
      } = options;

      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;

            // 先繪製原始圖片
            ctx.drawImage(img, 0, 0);

            // 取得像素資料
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // 模擬網點效果（簡化版）
            const cellSize = Math.max(2, Math.floor(300 / halftone));

            for (let y = 0; y < canvas.height; y += cellSize) {
              for (let x = 0; x < canvas.width; x += cellSize) {
                // 計算區域平均
                let avgR = 0, avgG = 0, avgB = 0, count = 0;

                for (let dy = 0; dy < cellSize && y + dy < canvas.height; dy++) {
                  for (let dx = 0; dx < cellSize && x + dx < canvas.width; dx++) {
                    const idx = ((y + dy) * canvas.width + (x + dx)) * 4;
                    avgR += data[idx];
                    avgG += data[idx + 1];
                    avgB += data[idx + 2];
                    count++;
                  }
                }

                avgR = avgR / count;
                avgG = avgG / count;
                avgB = avgB / count;

                // 模擬網點擴散 (Dot Gain)
                const darken = (val) => Math.max(0, val - (val * dotGain / 100));

                // 填充分散的網點區域
                for (let dy = 0; dy < cellSize && y + dy < canvas.height; dy++) {
                  for (let dx = 0; dx < cellSize && x + dx < canvas.width; dx++) {
                    const idx = ((y + dy) * canvas.width + (x + dx)) * 4;
                    data[idx] = darken(avgR);
                    data[idx + 1] = darken(avgG);
                    data[idx + 2] = darken(avgB);
                  }
                }
              }
            }

            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png', 0.95));
          } catch (error) {
            reject(error);
          }
        };
        img.onerror = () => reject(new Error('圖片載入失敗'));
        img.src = imageData;
      });
    }
