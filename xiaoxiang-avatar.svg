<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <defs>
    <!-- 大象皮膚漸層 -->
    <linearGradient id="elephantSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#D0D0D0"/>
      <stop offset="100%" style="stop-color:#B8B8B8"/>
    </linearGradient>
    <!-- 耳朵內側魔法漸層 -->
    <linearGradient id="earMagic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C7CFF"/>
      <stop offset="50%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#4ECDC4"/>
    </linearGradient>
    <!-- 魔法光暈 -->
    <radialGradient id="magicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9C7CFF;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#6C63FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:0"/>
    </radialGradient>
    <!-- 星星閃爍 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 魔法光暈背景 -->
  <circle cx="50" cy="50" r="48" fill="url(#magicGlow)"/>
  
  <!-- 左耳朵 -->
  <ellipse cx="18" cy="45" rx="20" ry="28" fill="url(#elephantSkin)" transform="rotate(-15 18 45)"/>
  <ellipse cx="18" cy="45" rx="14" ry="20" fill="url(#earMagic)" opacity="0.6" transform="rotate(-15 18 45)"/>
  
  <!-- 右耳朵 -->
  <ellipse cx="82" cy="45" rx="20" ry="28" fill="url(#elephantSkin)" transform="rotate(15 82 45)"/>
  <ellipse cx="82" cy="45" rx="14" ry="20" fill="url(#earMagic)" opacity="0.6" transform="rotate(15 82 45)"/>
  
  <!-- 頭部主體 -->
  <ellipse cx="50" cy="55" rx="35" ry="32" fill="url(#elephantSkin)"/>
  
  <!-- 象鼻 -->
  <path d="M44 74 Q38 82 36 90 Q34 96 40 97 Q46 98 48 92 Q50 86 46 78 Z" fill="url(#elephantSkin)"/>
  <ellipse cx="43" cy="96" rx="5" ry="3.5" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 眼睛（左）-->
  <g>
    <ellipse cx="35" cy="50" rx="7" ry="9" fill="#2C3E50"/>
    <circle cx="37" cy="47" r="3" fill="white"/>
    <circle cx="36" cy="52" r="1.5" fill="#9C7CFF" opacity="0.8"/>
  </g>
  
  <!-- 眼睛（右） -->
  <g>
    <ellipse cx="65" cy="50" rx="7" ry="9" fill="#2C3E50"/>
    <circle cx="67" cy="47" r="3" fill="white"/>
    <circle cx="66" cy="52" r="1.5" fill="#9C7CFF" opacity="0.8"/>
  </g>
  
  <!-- 眉毛（可愛弧形） -->
  <path d="M28 40 Q35 36 42 40" stroke="#9C7CFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M58 40 Q65 36 72 40" stroke="#9C7CFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- 小象牙 -->
  <path d="M40 74 Q36 80 38 84 Q40 86 43 82 Q44 78 42 74 Z" fill="#FFF8E7"/>
  <path d="M60 74 Q64 80 62 84 Q60 86 57 82 Q56 78 58 74 Z" fill="#FFF8E7"/>
  
  <!-- 魔法星星裝飾 -->
  <g filter="url(#glow)">
    <polygon points="50,15 52,20 57,20 53,24 54,29 50,26 46,29 47,24 43,20 48,20" fill="#FFD700" opacity="0.9"/>
    <polygon points="20,25 21,28 24,28 22,30 22,33 20,31 18,33 18,30 16,28 19,28" fill="#FFD700" opacity="0.7"/>
    <polygon points="80,25 81,28 84,28 82,30 82,33 80,31 78,33 78,30 76,28 79,28" fill="#FFD700" opacity="0.7"/>
  </g>
  
  <!-- 腮紅 -->
  <ellipse cx="25" cy="62" rx="6" ry="4" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="75" cy="62" rx="6" ry="4" fill="#FFB6C1" opacity="0.4"/>
  
  <!-- 微笑 -->
  <path d="M42 68 Q50 75 58 68" stroke="#9C7CFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
